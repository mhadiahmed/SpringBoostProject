name: CI

# Rewritten from a template that referenced ./mvnw (never committed to this
# repo, see pom.xml comments), SonarQube/Codecov/OWASP jobs needing secrets
# that don't exist, and 21-matrix testing that was never actually verified.
# Every run of the old version failed in 2-9s -- never once ran a real test.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Run tests
      run: mvn -B clean test

    - name: Upload test reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: surefire-reports
        path: target/surefire-reports/

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build jars
      run: mvn -B clean package -DskipTests -Dmaven.javadoc.skip=true -Dmaven.source.skip=true

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: spring-boost-jars
        path: target/spring-boost-*.jar
